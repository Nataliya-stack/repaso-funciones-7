<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        body {
            background: radial-gradient(circle at 10% 10%, #f3ece0 0%, #e2d4be 40%, #cbbba3 90%),
                        radial-gradient(circle at 90% 90%, #fcdcc5 0%, transparent 60%);
            font-family: 'Inter', sans-serif;            ;
        }
        h1 {
            font-family: "Playfair Display", serif;
            font-size: clamp(1.5rem, 3vw, 3rem);
            text-shadow: 0 4px 18px rgba(120, 53, 4, 0.12);
        }
        details[open] summary ~ * {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; }
  </style>  
  <title>JS - 7</title>
</head>

<body class="flex flex-col items-center justify-start min-h-screen p-4 md:p-8"> 

  <h1 class="font-bold text-center text-amber-950 px-2 my-2 md:my-4 max-w-3xl">
    Programa una función que valide si una palabra o frase dada, es un palíndromo
  </h1>   

  <div class="bg-stone-900 text-amber-50 w-full max-w-2xl p-6 md:p-10 rounded-2xl shadow-xl box-border">
    
    <div class="flex flex-col gap-3 mb-6 text-lg md:text-xl">
      <label for="inputTexto" class="text-left font-medium text-amber-200/90">Escriba texto:</label>  
      <input id="inputTexto" type="text" class="border-amber-200/30 border-2 rounded-xl px-4 py-3 w-full text-stone-900 bg-amber-50/95 focus:outline-none focus:border-amber-400 font-medium placeholder-stone-400" placeholder="Ej: Hola Mundo!">
    </div>

    <div class="flex justify-center text-lg md:text-xl">    
      <button type="button" id="btnCalcular" class="bg-amber-100 text-stone-950 font-bold py-3 px-8 rounded-xl hover:bg-amber-200 active:scale-[0.98] transition-all cursor-pointer w-full md:w-auto tracking-wide shadow-md">
        PRENSA AQUÍ
      </button>      
    </div>  

    <div class="mt-6 border-t border-amber-200/10 pt-4">
      <h2 class="font-bold text-xl md:text-2xl mb-3 text-center text-amber-200">
        Resultado:
      </h2>
      <p id="resultadoTexto" class="text-amber-100 text-center text-lg md:text-xl wrap-break-words px-4 py-3 bg-stone-950 border border-amber-200/5 rounded-xl min-h-14 flex items-center justify-center font-medium"></p>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>

</html>
